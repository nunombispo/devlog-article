name: Django CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        django-version: ["4.2", "5.0", "5.1"]
        exclude:
          - python-version: "3.10"
            django-version: "5.1"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://testuser:testpassword@localhost:5432/testdb
      DJANGO_SETTINGS_MODULE: devlog.settings
      SECRET_KEY: django-insecure-ci-only-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ matrix.django-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ matrix.django-version }}-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "django==${{ matrix.django-version }}.*"

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Django system check
        run: python manage.py check

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=80